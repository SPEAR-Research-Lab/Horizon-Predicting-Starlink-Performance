pipeline:
  stages:
    - name: "data_loading"
      description: "Load enriched measurement data"

    - name: "anomaly_filtering"
      description: "Apply anomaly detection"
      strategies:
        - "percentile"
        - "directional_mad"
        - "isolation_forest"

    - name: "feature_engineering"
      description: "Prepare features for modeling"
      features:
        - "lat"
        - "lon"
        - "client_server_distance_km"
        - "hour_with_minute"
        - "day_of_week"
        - "sat_density"
        - "weather_index"

    - name: "model_training"
      description: "Train ensemble models"

targets:
  download_latency_ms:
    description: "Download latency in milliseconds"
    optimal_filter: "percentile_0.75"
    weather_index_weights:
      cloud_cover: 0.462
      precipitation: 0.232
      wind_speed_10m: 0.229
      temperature_2m: 0.077

  download_throughput_mbps:
    description: "Download throughput in Mbps"
    optimal_filter: "isolation_forest_0.75"
    weather_index_weights:
      cloud_cover: 0.619
      precipitation: 0.289
      wind_speed_10m: 0.087
      temperature_2m: 0.005

filtering:
  percentile:
    keep_frac: 0.75
    voting_threshold: 0.5
    window_config:
      min_hours: 1.0
      max_hours: 3.0
      step_hours: 0.5
      min_matches: 8

  directional_mad:
    k: 2.5
    voting_threshold: 0.5
    window_config:
      min_hours: 1.0
      max_hours: 3.0
      step_hours: 0.5
      min_matches: 8

  isolation_forest:
    keep_frac: 0.75
    contamination_scale: 1  # 1 - keep_frac
    window_config:
      min_hours: 1.0
      max_hours: 3.0
      step_hours: 0.5
      min_matches: 8

models:
  ensemble:
    random_forest:
      n_estimators: 100
      random_state: 42
      n_jobs: -1

    gradient_boosting:
      n_estimators: 100
      learning_rate: 0.1
      random_state: 42

    scaling:
      method: "RobustScaler"
      with_centering: true
      with_scaling: true

training:
  test_split: 0.2
  random_state: 42
  weight_optimization:
    range: [0.05, 1.0]
    step: 0.05
    metric: "RMSE"

evaluation:
  metrics:
    - "MAE"
    - "RMSE"
    - "R²"

  split_strategy: "80-20"
  bootstrap_samples: 1000
