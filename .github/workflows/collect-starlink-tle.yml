name: Collect Starlink TLE Data

on:
  schedule:
    - cron: '0 15 * * *'  # 15:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r satellite-data/requirements.txt

      - name: Collect Starlink TLE data
        run: python satellite-data/celestrak-collection.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add satellite-data/
          if ! git diff --cached --quiet; then
            git commit -m "Update Starlink TLE data - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git pull
            git push
          fi
