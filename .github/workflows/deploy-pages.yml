name: Deploy to GitHub Pages

on:
  push:
    branches: [main, predictions-data]
    paths:
      - 'leo-viewer/frontend/**'
      - 'website/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch prediction data
        run: |
          git fetch origin predictions-data || true
          if git rev-parse origin/predictions-data >/dev/null 2>&1; then
            git checkout origin/predictions-data -- leo-viewer/frontend/public/
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend deps
        working-directory: leo-viewer/frontend
        run: npm install

      - name: Build frontend
        working-directory: leo-viewer/frontend
        run: npm run build-only

      - name: Assemble site
        run: |
          mkdir -p deploy
          cp website/index.html deploy/index.html
          cp -r leo-viewer/frontend/dist deploy/app

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
