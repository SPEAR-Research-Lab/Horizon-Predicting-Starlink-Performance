name: Collect Starlink Measurements

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ secrets.S3_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}'

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DATA_COLLECTION_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Install deps
        run: pip install -r weekly-measurements-collection/requirements.txt

      - name: Collect Starlink Measurements
        run: python weekly-measurements-collection/src/main.py

      - name: Commit and push changes
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add weekly-measurements-collection/data/
          if ! git diff --cached --quiet; then
            git commit -m "Update Starlink Measurements Data - $(date -u +'%Y-%m-%d %H:%M:%S') UTC"
            git pull --rebase
            git push
          else
            echo "No changes to commit — script may not have written any files"
          fi
